server {
    listen 80;
    server_name travelgo.bond www.travelgo.bond;

    root /var/www/travelgo/frontend/client/dist;
    index index.html;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # The inline home loader hash must match frontend/client/vite.config.js.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'sha256-a5RJFLK+jSiomY9a8C5YQhIqcxpDsJIKx8dcbcD7UtI=' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://*.supabase.co; frame-src https://js.stripe.com https://hooks.stripe.com; form-action 'self'; upgrade-insecure-requests" always;

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /llms.txt {
        default_type text/plain;
        try_files /llms.txt =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /llms-full.txt {
        default_type text/plain;
        try_files /llms-full.txt =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files /sitemap.xml =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /images/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(?:svg|ico|webp|png|jpg|jpeg|gif|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
